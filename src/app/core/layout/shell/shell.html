<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand__mark">
        <mat-icon>hub</mat-icon>
      </div>

      <div class="brand__text">
        <span class="brand__eyebrow">Mxorbit</span>
        <strong>Control Panel</strong>
      </div>
    </div>

    <nav class="nav">
      <a
        routerLink="/agents"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav__link"
      >
        <mat-icon>smart_toy</mat-icon>
        <span>Agent Registry</span>
      </a>

      <a
        routerLink="/projects"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav__link"
      >
        <mat-icon>folder_open</mat-icon>
        <span>Project Registry</span>
      </a>

      <a
        routerLink="/squads"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav__link"
      >
        <mat-icon>groups</mat-icon>
        <span>Squads</span>
      </a>

      <a
        routerLink="/autopilot"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav__link"
      >
        <mat-icon>auto_awesome</mat-icon>
        <span>Autopilot</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <button
        type="button"
        mat-stroked-button
        class="theme-button"
        (click)="themeService.toggleTheme()"
        >
        <mat-icon>{{ themeService.toggleIcon() }}</mat-icon>
        <span>{{ themeService.toggleLabel() }}</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
